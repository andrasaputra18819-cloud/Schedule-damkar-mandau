<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkCal - Kalender Shift Kerja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .shift-morning { background-color: #dcfce7; color: #166534; border-bottom: 4px solid #22c55e; }
        .shift-night { background-color: #dbeafe; color: #1e40af; border-bottom: 4px solid #3b82f6; }
        .shift-off { background-color: #fee2e2; color: #991b1b; border-bottom: 4px solid #ef4444; }
        .today { outline: 2px solid #6366f1; outline-offset: -2px; }
        .modal { transition: opacity 0.25s ease; }
        .modal-active { overflow-x: hidden; overflow-y: visible !important; }
    </style>
</head>
<body class="pb-10">

    <!-- Header & Navigation -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800"><i class="fa-solid fa-calendar-days text-indigo-600 mr-2"></i>WorkCal</h1>
            <button onclick="toggleModal('settings-modal')" class="p-2 hover:bg-slate-100 rounded-full transition">
                <i class="fa-solid fa-gear text-slate-600 text-lg"></i>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <!-- Calendar Control -->
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm">
            <button onclick="changeMonth(-1)" class="p-2 hover:bg-indigo-50 text-indigo-600 rounded-lg"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 id="current-month-year" class="text-lg font-semibold text-slate-700 uppercase tracking-wider">Januari 2024</h2>
            <button onclick="changeMonth(1)" class="p-2 hover:bg-indigo-50 text-indigo-600 rounded-lg"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <!-- Legend -->
        <div class="flex flex-wrap gap-4 mb-4 text-xs font-medium justify-center lg:justify-start">
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span>Pagi (3)</div>
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-blue-500 mr-2"></span>Malam (3)</div>
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span>Libur (6)</div>
        </div>

        <!-- Calendar Grid -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="calendar-grid bg-slate-50 border-b">
                <div class="py-3 text-center text-xs font-bold text-slate-400">MIN</div>
                <div class="py-3 text-center text-xs font-bold text-slate-400">SEN</div>
                <div class="py-3 text-center text-xs font-bold text-slate-400">SEL</div>
                <div class="py-3 text-center text-xs font-bold text-slate-400">RAB</div>
                <div class="py-3 text-center text-xs font-bold text-slate-400">KAM</div>
                <div class="py-3 text-center text-xs font-bold text-slate-400">JUM</div>
                <div class="py-3 text-center text-xs font-bold text-slate-400">SAB</div>
            </div>
            <div id="calendar-days" class="calendar-grid">
                <!-- JS Inject days here -->
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-50"></div>
        <div class="bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-xl z-50 overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-slate-800">Pengaturan Shift</h3>
                    <button onclick="toggleModal('settings-modal')"><i class="fa-solid fa-xmark text-slate-400"></i></button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Tanggal Mulai Siklus (Seed Date)</label>
                        <input type="date" id="seed-date" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">Durasi Pagi</label>
                            <input type="number" id="dur-morning" value="3" class="w-full border rounded-lg p-2">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">Durasi Malam</label>
                            <input type="number" id="dur-night" value="3" class="w-full border rounded-lg p-2">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">Durasi Libur</label>
                            <input type="number" id="dur-off" value="6" class="w-full border rounded-lg p-2">
                        </div>
                    </div>
                    <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Simpan Perubahan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Note Modal -->
    <div id="note-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-50"></div>
        <div class="bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-xl z-50 overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="note-date-title" class="text-xl font-bold text-slate-800">Catatan Tanggal</h3>
                    <button onclick="toggleModal('note-modal')"><i class="fa-solid fa-xmark text-slate-400"></i></button>
                </div>
                <textarea id="note-text" rows="4" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none mb-4" placeholder="Tulis kegiatan atau rencana..."></textarea>
                <button onclick="saveNote()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Simpan Catatan</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let currentDisplayDate = new Date();
        let settings = JSON.parse(localStorage.getItem('workCalSettings')) || {
            seedDate: '2024-01-01',
            durMorning: 3,
            durNight: 3,
            durOff: 6
        };
        let notes = JSON.parse(localStorage.getItem('workCalNotes')) || {};
        let activeNoteDate = '';

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('seed-date').value = settings.seedDate;
            document.getElementById('dur-morning').value = settings.durMorning;
            document.getElementById('dur-night').value = settings.durNight;
            document.getElementById('dur-off').value = settings.durOff;
            renderCalendar();
        });

        // --- Core Logic ---
        function getShift(date) {
            const start = new Date(settings.seedDate);
            start.setHours(0,0,0,0);
            const current = new Date(date);
            current.setHours(0,0,0,0);

            const diffTime = current - start;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            const cycleDays = parseInt(settings.durMorning) + parseInt(settings.durNight) + parseInt(settings.durOff);
            // Handle negative modulo
            let index = diffDays % cycleDays;
            if (index < 0) index += cycleDays;

            if (index < settings.durMorning) return 'shift-morning';
            if (index < (parseInt(settings.durMorning) + parseInt(settings.durNight))) return 'shift-night';
            return 'shift-off';
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-days');
            const title = document.getElementById('current-month-year');
            container.innerHTML = '';

            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            
            title.innerText = new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric' }).format(currentDisplayDate);

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            // Padding days from previous month
            for (let i = 0; i < firstDay; i++) {
                container.innerHTML += `<div class="p-4 border-b border-r bg-slate-50"></div>`;
            }

            // Days of the month
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = dateObj.toISOString().split('T')[0];
                const shiftClass = getShift(dateObj);
                const isToday = dateObj.toDateString() === today.toDateString() ? 'today' : '';
                const hasNote = notes[dateStr] ? '<div class="w-1.5 h-1.5 bg-indigo-500 rounded-full mt-1 mx-auto"></div>' : '';

                container.innerHTML += `
                    <div onclick="openNoteModal('${dateStr}')" class="min-h-[80px] p-2 border-b border-r cursor-pointer hover:opacity-80 transition relative ${shiftClass} ${isToday}">
                        <span class="text-sm font-bold">${d}</span>
                        ${hasNote}
                    </div>
                `;
            }
        }

        // --- Interaction Functions ---
        function changeMonth(val) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + val);
            renderCalendar();
        }

        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
            document.body.classList.toggle('modal-active');
        }

        function saveSettings() {
            settings = {
                seedDate: document.getElementById('seed-date').value,
                durMorning: parseInt(document.getElementById('dur-morning').value),
                durNight: parseInt(document.getElementById('dur-night').value),
                durOff: parseInt(document.getElementById('dur-off').value)
            };
            localStorage.setItem('workCalSettings', JSON.stringify(settings));
            renderCalendar();
            toggleModal('settings-modal');
        }

        function openNoteModal(dateStr) {
            activeNoteDate = dateStr;
            const dateParsed = new Date(dateStr);
            document.getElementById('note-date-title').innerText = dateParsed.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('note-text').value = notes[dateStr] || '';
            toggleModal('note-modal');
        }

        function saveNote() {
            const text = document.getElementById('note-text').value;
            if (text.trim() === '') {
                delete notes[activeNoteDate];
            } else {
                notes[activeNoteDate] = text;
            }
            localStorage.setItem('workCalNotes', JSON.stringify(notes));
            renderCalendar();
            toggleModal('note-modal');
        }
    </script>
</body>
</html>
