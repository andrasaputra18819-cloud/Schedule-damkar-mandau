    <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Damkar Mandau - Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --color-pagi: #fef08a; /* Kuning */
            --color-malam: #2563eb; /* Biru */
            --color-libur: #ef4444; /* Merah */
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Styling Shift */
        .shift-pagi { background-color: var(--color-pagi) !important; color: #854d0e !important; border-bottom: 4px solid #eab308; }
        .shift-malam { background-color: var(--color-malam) !important; color: white !important; border-bottom: 4px solid #1e40af; }
        .shift-libur { background-color: var(--color-libur) !important; color: white !important; border-bottom: 4px solid #b91c1c; }
        
        /* Badge Kecil Regu Lain */
        .b-p { background: #eab308; color: white; padding: 1px 3px; border-radius: 3px; font-size: 8px; font-weight: 800; }
        .b-m { background: #1e40af; color: white; padding: 1px 3px; border-radius: 3px; font-size: 8px; font-weight: 800; }
        .b-l { background: #991b1b; color: white; padding: 1px 3px; border-radius: 3px; font-size: 8px; font-weight: 800; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .today-mark { box-shadow: inset 0 0 0 3px #000; }
        
        /* Animasi Modal */
        .modal { transition: all 0.2s ease-out; transform: translateY(20px); opacity: 0; pointer-events: none; }
        .modal.active { transform: translateY(0); opacity: 1; pointer-events: auto; }

        /* Scrollbar tersembunyi */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none">

    <!-- Header Android Style -->
    <header class="bg-slate-900 text-white p-5 pt-8 rounded-b-[2rem] shadow-lg sticky top-0 z-30">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-800 tracking-tight">DAMKAR <span class="text-yellow-400">MANDAU</span></h1>
                <p id="my-regu-info" class="text-xs text-slate-400 font-semibold mt-1 uppercase tracking-widest"></p>
            </div>
            <div class="flex gap-3">
                <button onclick="goToToday()" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center border border-slate-700">
                    <i class="fa-solid fa-calendar-day text-yellow-400"></i>
                </button>
                <button onclick="toggleModal('settings-modal')" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center border border-slate-700">
                    <i class="fa-solid fa-gear text-white"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <!-- Month Selector -->
        <div class="flex justify-between items-center mb-6">
            <button onclick="changeMonth(-1)" class="w-12 h-12 flex items-center justify-center bg-white rounded-2xl shadow-sm border"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 id="current-month-year" class="text-lg font-bold text-slate-800 uppercase tracking-widest"></h2>
            <button onclick="changeMonth(1)" class="w-12 h-12 flex items-center justify-center bg-white rounded-2xl shadow-sm border"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <!-- Legend Simple -->
        <div class="flex gap-4 justify-center mb-6">
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-yellow-400"></span><span class="text-[10px] font-bold">PAGI</span></div>
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-blue-600"></span><span class="text-[10px] font-bold">MALAM</span></div>
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-red-500"></span><span class="text-[10px] font-bold">LIBUR</span></div>
        </div>

        <!-- Calendar Card -->
        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden mb-10">
            <div class="calendar-grid bg-slate-50 border-b">
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Min</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Sen</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Sel</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Rab</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Kam</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Jum</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Sab</div>
            </div>
            <div id="calendar-days" class="calendar-grid">
                <!-- Injected by JS -->
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal fixed inset-0 flex items-end sm:items-center justify-center z-50 p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="toggleModal('settings-modal')"></div>
        <div class="bg-white w-full max-w-md rounded-t-[3rem] sm:rounded-[2rem] p-8 z-50 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h3 class="text-xl font-800 mb-6 text-slate-800">PENGATURAN</h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">Pilih Regu Anda</label>
                    <select id="my-regu" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-yellow-400 transition">
                        <option value="1">REGU 1</option>
                        <option value="2">REGU 2</option>
                        <option value="3">REGU 3</option>
                        <option value="4">REGU 4</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">Tanggal Acuan (Siklus Mulai)</label>
                    <input type="date" id="seed-date" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold">
                </div>
                <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold shadow-lg active:scale-95 transition uppercase tracking-widest">Simpan Data</button>
            </div>
        </div>
    </div>

    <!-- Note Modal -->
    <div id="note-modal" class="modal fixed inset-0 flex items-end sm:items-center justify-center z-50 p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="toggleModal('note-modal')"></div>
        <div class="bg-white w-full max-w-md rounded-t-[3rem] sm:rounded-[2rem] p-8 z-50 shadow-2xl">
            <h3 id="note-date-title" class="text-xl font-800 mb-2 text-slate-800 uppercase tracking-tight"></h3>
            <div id="daily-regu-list" class="flex flex-wrap gap-2 mb-6"></div>
            <textarea id="note-text" rows="4" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-semibold outline-none focus:border-blue-500 transition mb-4" placeholder="Tulis kegiatan atau agenda..."></textarea>
            <button onclick="saveNote()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold active:scale-95 transition uppercase tracking-widest">Simpan Catatan</button>
        </div>
    </div>

    <script>
        let currentDisplayDate = new Date();
        let settings = JSON.parse(localStorage.getItem('damkarMandau_v1')) || {
            seedDate: '2024-01-01',
            myRegu: 1
        };
        let notes = JSON.parse(localStorage.getItem('damkarNotes_v1')) || {};
        let activeNoteDate = '';

        const CYCLE_LEN = 12;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('seed-date').value = settings.seedDate;
            document.getElementById('my-regu').value = settings.myRegu;
            renderCalendar();
        });

        function getReguStatus(date, reguNum) {
            const start = new Date(settings.seedDate);
            start.setHours(0,0,0,0);
            const current = new Date(date);
            current.setHours(0,0,0,0);

            const diffDays = Math.floor((current - start) / (1000 * 60 * 60 * 24));
            const offset = (reguNum - 1) * 3;
            let index = (diffDays - offset) % CYCLE_LEN;
            if (index < 0) index += CYCLE_LEN;

            if (index < 3) return { code: 'P', label: 'Pagi', class: 'shift-pagi', badge: 'b-p' };
            if (index < 6) return { code: 'M', label: 'Malam', class: 'shift-malam', badge: 'b-m' };
            return { code: 'L', label: 'Libur', class: 'shift-libur', badge: 'b-l' };
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-days');
            const title = document.getElementById('current-month-year');
            const info = document.getElementById('my-regu-info');
            container.innerHTML = '';

            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            title.innerText = new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric' }).format(currentDisplayDate);
            info.innerText = `Jadwal Utama: Regu ${settings.myRegu}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toLocaleDateString('en-CA');

            for (let i = 0; i < firstDay; i++) {
                container.innerHTML += `<div class="p-2 border-b border-r border-slate-50 bg-slate-50/20"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = dateObj.toLocaleDateString('en-CA');
                
                const r1 = getReguStatus(dateObj, 1);
                const r2 = getReguStatus(dateObj, 2);
                const r3 = getReguStatus(dateObj, 3);
                const r4 = getReguStatus(dateObj, 4);

                const myStatus = getReguStatus(dateObj, parseInt(settings.myRegu));
                const isToday = dateStr === todayStr ? 'today-mark' : '';
                const hasNote = notes[dateStr] ? '<div class="w-1.5 h-1.5 bg-white rounded-full mt-1"></div>' : '';

                container.innerHTML += `
                    <div onclick="openNoteModal('${dateStr}')" class="min-h-[110px] p-2 border-b border-r border-slate-50 relative ${myStatus.class} ${isToday} transition-all active:scale-90">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-black">${d}</span>
                            ${hasNote}
                        </div>
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between items-center"><span class="text-[8px] font-bold opacity-70">R1</span><span class="${r1.badge}">${r1.code}</span></div>
                            <div class="flex justify-between items-center"><span class="text-[8px] font-bold opacity-70">R2</span><span class="${r2.badge}">${r2.code}</span></div>
                            <div class="flex justify-between items-center"><span class="text-[8px] font-bold opacity-70">R3</span><span class="${r3.badge}">${r3.code}</span></div>
                            <div class="flex justify-between items-center"><span class="text-[8px] font-bold opacity-70">R4</span><span class="${r4.badge}">${r4.code}</span></div>
                        </div>
                    </div>
                `;
            }
        }

        function openNoteModal(dateStr) {
            activeNoteDate = dateStr;
            const dateObj = new Date(dateStr);
            document.getElementById('note-date-title').innerText = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' });
            
            const reguList = document.getElementById('daily-regu-list');
            reguList.innerHTML = [1,2,3,4].map(num => {
                const s = getReguStatus(dateObj, num);
                return `<div class="bg-slate-100 px-3 py-2 rounded-xl flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-500">R${num}</span>
                            <span class="text-[10px] font-black uppercase ${s.class.replace('shift-', 'text-')}">${s.label}</span>
                        </div>`;
            }).join('');

            document.getElementById('note-text').value = notes[dateStr] || '';
            toggleModal('note-modal');
        }

        function saveSettings() {
            settings.seedDate = document.getElementById('seed-date').value;
            settings.myRegu = document.getElementById('my-regu').value;
            localStorage.setItem('damkarMandau_v1', JSON.stringify(settings));
            renderCalendar();
            toggleModal('settings-modal');
        }

        function saveNote() {
            const txt = document.getElementById('note-text').value.trim();
            if (txt === '') delete notes[activeNoteDate];
            else notes[activeNoteDate] = txt;
            localStorage.setItem('damkarNotes_v1', JSON.stringify(notes));
            renderCalendar();
            toggleModal('note-modal');
        }

        function changeMonth(v) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + v);
            renderCalendar();
        }

        function goToToday() {
            currentDisplayDate = new Date();
            renderCalendar();
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
        }
    </script>
</body>
</html>
