<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Damkar Mandau - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --color-pagi: #fef08a; /* Kuning */
            --color-malam: #2563eb; /* Biru */
            --color-libur: #ef4444; /* Merah */
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Warna Shift Utama */
        .shift-pagi { background-color: var(--color-pagi) !important; color: #854d0e !important; border-bottom: 5px solid #eab308; }
        .shift-malam { background-color: var(--color-malam) !important; color: white !important; border-bottom: 5px solid #1e40af; }
        .shift-libur { background-color: var(--color-libur) !important; color: white !important; border-bottom: 5px solid #b91c1c; }
        
        /* Badge Regu Lain */
        .b-p { background: #eab308; color: white; padding: 2px 4px; border-radius: 4px; font-size: 8px; font-weight: 800; }
        .b-m { background: #1e40af; color: white; padding: 2px 4px; border-radius: 4px; font-size: 8px; font-weight: 800; }
        .b-l { background: #991b1b; color: white; padding: 2px 4px; border-radius: 4px; font-size: 8px; font-weight: 800; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .today-mark { outline: 3px solid #000; outline-offset: -3px; }
        
        .modal { transition: all 0.2s ease-out; opacity: 0; pointer-events: none; visibility: hidden; }
        .modal.active { opacity: 1; pointer-events: auto; visibility: visible; }
        .modal-content { transition: all 0.3s ease-out; transform: translateY(100px); }
        .modal.active .modal-content { transform: translateY(0); }
    </style>
</head>
<body class="select-none pb-10">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-6 pt-10 rounded-b-[2.5rem] shadow-2xl sticky top-0 z-30">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-800 tracking-tight">DAMKAR <span class="text-yellow-400">MANDAU</span></h1>
                <p id="regu-header" class="text-xs text-slate-400 font-bold mt-1 uppercase tracking-widest"></p>
            </div>
            <div class="flex gap-3">
                <button onclick="goToToday()" class="w-11 h-11 bg-slate-800 rounded-2xl flex items-center justify-center border border-slate-700 active:scale-90 transition">
                    <i class="fa-solid fa-calendar-day text-yellow-400"></i>
                </button>
                <button onclick="toggleModal('settings-modal')" class="w-11 h-11 bg-slate-800 rounded-2xl flex items-center justify-center border border-slate-700 active:scale-90 transition">
                    <i class="fa-solid fa-sliders text-white"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <!-- Selector Bulan -->
        <div class="flex justify-between items-center mb-6 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
            <button onclick="changeMonth(-1)" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 id="current-month-year" class="text-sm font-800 text-slate-700 uppercase tracking-widest"></h2>
            <button onclick="changeMonth(1)" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <!-- Kalender -->
        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-200 overflow-hidden">
            <div class="calendar-grid bg-slate-50 border-b border-slate-100">
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Min</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Sen</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Sel</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Rab</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Kam</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Jum</div>
                <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase">Sab</div>
            </div>
            <div id="calendar-days" class="calendar-grid"></div>
        </div>

        <!-- Legend -->
        <div class="mt-6 flex justify-center gap-4">
            <div class="px-4 py-2 bg-yellow-100 rounded-full text-[10px] font-bold text-yellow-700">PAGI</div>
            <div class="px-4 py-2 bg-blue-100 rounded-full text-[10px] font-bold text-blue-700">MALAM</div>
            <div class="px-4 py-2 bg-red-100 rounded-full text-[10px] font-bold text-red-700">LIBUR</div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal fixed inset-0 flex items-end sm:items-center justify-center z-50 p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="toggleModal('settings-modal')"></div>
        <div class="modal-content bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2rem] p-8 z-50 shadow-2xl">
            <h3 class="text-xl font-800 mb-6 text-slate-800">PENGATURAN</h3>
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">Regu Anda</label>
                    <select id="my-regu" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-yellow-400">
                        <option value="1">REGU 1</option>
                        <option value="2">REGU 2</option>
                        <option value="3">REGU 3</option>
                        <option value="4">REGU 4</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">Tanggal Mulai Siklus</label>
                    <input type="date" id="seed-date" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold">
                    <p class="text-[10px] text-slate-400 mt-2 font-medium">*Atur ke tanggal dimana Regu 1 mulai Pagi hari pertama.</p>
                </div>
                <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold active:scale-95 transition uppercase tracking-widest">Simpan & Refresh</button>
            </div>
        </div>
    </div>

    <!-- Note Modal -->
    <div id="note-modal" class="modal fixed inset-0 flex items-end sm:items-center justify-center z-50 p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="toggleModal('note-modal')"></div>
        <div class="modal-content bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2rem] p-8 z-50 shadow-2xl">
            <h3 id="note-date-title" class="text-xl font-800 mb-4 text-slate-800 uppercase tracking-tight"></h3>
            <div id="daily-regu-list" class="grid grid-cols-2 gap-2 mb-6"></div>
            <textarea id="note-text" rows="3" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-semibold outline-none focus:border-blue-500 transition mb-4" placeholder="Tambah catatan..."></textarea>
            <button onclick="saveNote()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold active:scale-95 transition uppercase tracking-widest">Simpan Catatan</button>
        </div>
    </div>

    <script>
        // Inisialisasi State
        let currentDisplayDate = new Date();
        let settings = JSON.parse(localStorage.getItem('damkarMandau_v2')) || {
            seedDate: '2024-01-01',
            myRegu: 1
        };
        let notes = JSON.parse(localStorage.getItem('damkarNotes_v2')) || {};
        let activeNoteDate = '';

        const CYCLE_LEN = 12;

        document.addEventListener('DOMContentLoaded', () => {
            // Load input values dari settings
            document.getElementById('seed-date').value = settings.seedDate;
            document.getElementById('my-regu').value = settings.myRegu;
            renderCalendar();
        });

        function getReguStatus(date, reguNum) {
            const start = new Date(settings.seedDate);
            start.setHours(0,0,0,0);
            const current = new Date(date);
            current.setHours(0,0,0,0);

            const diffDays = Math.floor((current - start) / (1000 * 60 * 60 * 24));
            const offset = (reguNum - 1) * 3;
            let index = (diffDays - offset) % CYCLE_LEN;
            if (index < 0) index += CYCLE_LEN;

            if (index < 3) return { code: 'P', label: 'Pagi', class: 'shift-pagi', badge: 'b-p' };
            if (index < 6) return { code: 'M', label: 'Malam', class: 'shift-malam', badge: 'b-m' };
            return { code: 'L', label: 'Libur', class: 'shift-libur', badge: 'b-l' };
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-days');
            const title = document.getElementById('current-month-year');
            const headerInfo = document.getElementById('regu-header');
            container.innerHTML = '';

            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            title.innerText = new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric' }).format(currentDisplayDate);
            headerInfo.innerText = `Regu Utama: ${settings.myRegu}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toLocaleDateString('en-CA');

            for (let i = 0; i < firstDay; i++) {
                container.innerHTML += `<div class="p-2 border-b border-r border-slate-50 bg-slate-50/30"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = dateObj.toLocaleDateString('en-CA');
                
                const r1 = getReguStatus(dateObj, 1);
                const r2 = getReguStatus(dateObj, 2);
                const r3 = getReguStatus(dateObj, 3);
                const r4 = getReguStatus(dateObj, 4);

                const myStatus = getReguStatus(dateObj, parseInt(settings.myRegu));
                const isToday = dateStr === todayStr ? 'today-mark' : '';
                const hasNote = notes[dateStr] ? '<div class="w-1.5 h-1.5 bg-white rounded-full mt-1 mx-auto"></div>' : '';

                container.innerHTML += `
                    <div onclick="openNoteModal('${dateStr}')" class="min-h-[115px] p-2 border-b border-r border-slate-100 relative ${myStatus.class} ${isToday} active:scale-95 transition-transform">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[11px] font-black">${d}</span>
                            ${hasNote}
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between items-center"><span class="text-[7px] font-bold opacity-60">R1</span><span class="${r1.badge}">${r1.code}</span></div>
                            <div class="flex justify-between items-center"><span class="text-[7px] font-bold opacity-60">R2</span><span class="${r2.badge}">${r2.code}</span></div>
                            <div class="flex justify-between items-center"><span class="text-[7px] font-bold opacity-60">R3</span><span class="${r3.badge}">${r3.code}</span></div>
                            <div class="flex justify-between items-center"><span class="text-[7px] font-bold opacity-60">R4</span><span class="${r4.badge}">${r4.code}</span></div>
                        </div>
                    </div>
                `;
            }
        }

        function saveSettings() {
            const newSeed = document.getElementById('seed-date').value;
            const newRegu = document.getElementById('my-regu').value;

            if(!newSeed) {
                alert("Silakan pilih tanggal acuan!");
                return;
            }

            // Update Global Variable
            settings.seedDate = newSeed;
            settings.myRegu = newRegu;

            // Simpan ke LocalStorage
            localStorage.setItem('damkarMandau_v2', JSON.stringify(settings));
            
            // Refresh Halaman untuk memastikan logic terupdate bersih
            location.reload();
        }

        function openNoteModal(dateStr) {
            activeNoteDate = dateStr;
            const dateObj = new Date(dateStr);
            document.getElementById('note-date-title').innerText = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' });
            
            const reguList = document.getElementById('daily-regu-list');
            reguList.innerHTML = [1,2,3,4].map(num => {
                const s = getReguStatus(dateObj, num);
                const colorClass = s.code === 'P' ? 'text-yellow-600' : s.code === 'M' ? 'text-blue-600' : 'text-red-600';
                return `<div class="bg-slate-50 p-3 rounded-xl border border-slate-100 flex flex-col items-center">
                            <span class="text-[9px] font-bold text-slate-400 uppercase">Regu ${num}</span>
                            <span class="text-xs font-black ${colorClass}">${s.label}</span>
                        </div>`;
            }).join('');

            document.getElementById('note-text').value = notes[dateStr] || '';
            toggleModal('note-modal');
        }

        function saveNote() {
            const txt = document.getElementById('note-text').value.trim();
            if (txt === '') delete notes[activeNoteDate];
            else notes[activeNoteDate] = txt;
            localStorage.setItem('damkarNotes_v2', JSON.stringify(notes));
            renderCalendar();
            toggleModal('note-modal');
        }

        function changeMonth(v) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + v);
            renderCalendar();
        }

        function goToToday() {
            currentDisplayDate = new Date();
            renderCalendar();
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
        }
    </script>
</body>
</html>
