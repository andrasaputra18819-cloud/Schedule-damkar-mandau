  <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Damkar Mandau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --pagi: #fef08a; --malam: #2563eb; --libur: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .shift-pagi { background: var(--pagi)!important; color: #854d0e!important; border-bottom: 4px solid #eab308; }
        .shift-malam { background: var(--malam)!important; color: white!important; border-bottom: 4px solid #1e40af; }
        .shift-libur { background: var(--libur)!important; color: white!important; border-bottom: 4px solid #b91c1c; }
        .b-p { background: #eab308; color: white; padding: 1px 3px; border-radius: 3px; font-size: 8px; font-weight: 800; }
        .b-m { background: #1e40af; color: white; padding: 1px 3px; border-radius: 3px; font-size: 8px; font-weight: 800; }
        .b-l { background: #991b1b; color: white; padding: 1px 3px; border-radius: 3px; font-size: 8px; font-weight: 800; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .modal { transition: all 0.2s; opacity: 0; pointer-events: none; visibility: hidden; z-index: 50; }
        .modal.active { opacity: 1; pointer-events: auto; visibility: visible; }
        .today { outline: 3px solid black; outline-offset: -3px; }
    </style>
</head>
<body class="pb-10 select-none">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-5 pt-8 rounded-b-[2rem] shadow-lg sticky top-0 z-30">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-800 tracking-tight">DAMKAR <span class="text-yellow-400">MANDAU</span></h1>
                <p id="info-regu" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="changeMonth(0, true)" class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700"><i class="fa-solid fa-calendar-day text-yellow-400"></i></button>
                <button onclick="openModal('settings-modal')" class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700"><i class="fa-solid fa-gear text-white"></i></button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <!-- Navigasi -->
        <div class="flex justify-between items-center mb-6 bg-white p-2 rounded-2xl border shadow-sm">
            <button onclick="changeMonth(-1)" class="w-10 h-10 text-slate-400"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 id="month-title" class="text-sm font-bold text-slate-800 uppercase tracking-widest"></h2>
            <button onclick="changeMonth(1)" class="w-10 h-10 text-slate-400"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <!-- Kalender -->
        <div class="bg-white rounded-[2rem] shadow-xl border overflow-hidden mb-6">
            <div class="calendar-grid bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase text-center py-3">
                <div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
            </div>
            <div id="calendar-days" class="calendar-grid"></div>
        </div>

        <!-- Legend -->
        <div class="flex gap-3 justify-center text-[9px] font-bold">
            <div class="px-3 py-1 bg-yellow-100 text-yellow-600 rounded-full">PAGI</div>
            <div class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full">MALAM</div>
            <div class="px-3 py-1 bg-red-100 text-red-600 rounded-full">LIBUR</div>
        </div>
    </main>

    <!-- Modal Settings -->
    <div id="settings-modal" class="modal fixed inset-0 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeModal('settings-modal')"></div>
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 relative shadow-2xl">
            <h3 class="text-xl font-800 mb-6 text-slate-800">PENGATURAN</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Pilih Regu Anda</label>
                    <select id="set-regu" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
                        <option value="1">REGU 1</option><option value="2">REGU 2</option><option value="3">REGU 3</option><option value="4">REGU 4</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Tanggal Acuan (Regu 1 Pagi)</label>
                    <input type="date" id="set-seed" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                </div>
                <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold uppercase tracking-widest">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Note -->
    <div id="note-modal" class="modal fixed inset-0 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeModal('note-modal')"></div>
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 relative shadow-2xl text-center">
            <h3 id="note-date" class="text-xl font-800 mb-4 text-slate-800 uppercase"></h3>
            <div id="regu-list" class="grid grid-cols-2 gap-2 mb-6"></div>
            <textarea id="note-text" rows="3" class="w-full p-4 bg-slate-50 border rounded-2xl font-semibold mb-4 outline-none" placeholder="Tulis catatan..."></textarea>
            <button onclick="saveNote()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase tracking-widest">Simpan</button>
        </div>
    </div>

    <script>
        let viewDate = new Date();
        let settings = JSON.parse(localStorage.getItem('dm_set')) || { seed: '2024-01-01', regu: 1 };
        let notes = JSON.parse(localStorage.getItem('dm_notes')) || {};
        let activeDate = '';

        function getStatus(date, regu) {
            const diff = Math.floor((new Date(date).setHours(0,0,0,0) - new Date(settings.seed).setHours(0,0,0,0)) / 864e5);
            let idx = (diff - (regu - 1) * 3) % 12;
            if (idx < 0) idx += 12;
            if (idx < 3) return { c: 'P', l: 'Pagi', s: 'shift-pagi', b: 'b-p' };
            if (idx < 6) return { c: 'M', l: 'Malam', s: 'shift-malam', b: 'b-m' };
            return { c: 'L', l: 'Libur', s: 'shift-libur', b: 'b-l' };
        }

        function render() {
            const daysCont = document.getElementById('calendar-days');
            daysCont.innerHTML = '';
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            document.getElementById('month-title').innerText = new Intl.DateTimeFormat('id-ID',{month:'long',year:'numeric'}).format(viewDate);
            document.getElementById('info-regu').innerText = 'REGU ANDA: ' + settings.regu;

            const first = new Date(y, m, 1).getDay();
            const total = new Date(y, m + 1, 0).getDate();
            const today = new Date().toISOString().split('T')[0];

            for(let i=0; i<first; i++) daysCont.innerHTML += `<div class="p-2 border-b border-r border-slate-50 bg-slate-50/30"></div>`;

            for(let d=1; d<=total; d++) {
                const date = new Date(y, m, d).toLocaleDateString('en-CA');
                const my = getStatus(date, settings.regu);
                const hasNote = notes[date] ? '<div class="w-1 h-1 bg-white rounded-full mx-auto mt-1"></div>' : '';
                
                let reguGrid = '';
                for(let r=1; r<=4; r++) {
                    const s = getStatus(date, r);
                    reguGrid += `<div class="flex justify-between items-center px-1"><span class="text-[7px] font-bold opacity-60">R${r}</span><span class="${s.b}">${s.c}</span></div>`;
                }

                daysCont.innerHTML += `
                    <div onclick="openNote('${date}')" class="min-h-[110px] p-2 border-b border-r border-slate-100 relative ${my.s} ${date===today?'today':''}">
                        <div class="flex justify-between items-center mb-1 font-black text-[11px]"><span>${d}</span>${hasNote}</div>
                        <div class="space-y-0.5">${reguGrid}</div>
                    </div>`;
            }
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function saveSettings() {
            settings.regu = document.getElementById('set-regu').value;
            settings.seed = document.getElementById('set-seed').value;
            localStorage.setItem('dm_set', JSON.stringify(settings));
            location.reload();
        }

        function openNote(date) {
            activeDate = date;
            document.getElementById('note-date').innerText = new Date(date).toLocaleDateString('id-ID',{day:'numeric',month:'long'});
            document.getElementById('note-text').value = notes[date] || '';
            const list = document.getElementById('regu-list');
            list.innerHTML = '';
            for(let r=1; r<=4; r++) {
                const s = getStatus(date, r);
                list.innerHTML += `<div class="bg-slate-50 p-2 rounded-xl border text-[10px]">REGU ${r}<br><b class="${s.c==='P'?'text-yellow-600':s.c==='M'?'text-blue-600':'text-red-600'}">${s.l}</b></div>`;
            }
            openModal('note-modal');
        }

        function saveNote() {
            const val = document.getElementById('note-text').value.trim();
            if(val) notes[activeDate] = val; else delete notes[activeDate];
            localStorage.setItem('dm_notes', JSON.stringify(notes));
            render(); closeModal('note-modal');
        }

        function changeMonth(v, reset=false) {
            if(reset) viewDate = new Date(); else viewDate.setMonth(viewDate.getMonth() + v);
            render();
        }

        document.getElementById('set-seed').value = settings.seed;
        document.getElementById('set-regu').value = settings.regu;
        render();
    </script>
</body>
</html>
